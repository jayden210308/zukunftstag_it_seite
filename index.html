<!-- ========= TOOLS PANEL (öffnet per Shift+Strg+C) ========= -->
<style>
  #toolsPanel{
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.55);
    display:none;
    align-items:center;
    justify-content:center;
    padding: 18px;
    z-index: 9999;
  }
  #toolsBox{
    width: min(520px, 96%);
    background:white;
    border-radius: 16px;
    box-shadow: 0 20px 60px rgba(0,0,0,.25);
    padding: 16px;
    text-align:left;
  }
  #toolsBox h3{ margin:0 0 10px; color:#0f172a; }
  #toolsInput{
    width: 100%;
    padding: 12px 12px;
    border-radius: 12px;
    border: 1px solid #cbd5e1;
    font-size: 14px;
    box-sizing:border-box;
  }
  #toolsMsg{
    margin-top:10px;
    font-size: 13px;
    opacity: .8;
    line-height: 1.35;
    min-height: 18px;
  }
  .toolsBtns{
    display:flex; gap:10px; justify-content:flex-end; margin-top:12px; flex-wrap:wrap;
  }
  .toolsBtn{
    border:none;
    border-radius: 12px;
    padding: 10px 14px;
    font-weight: 900;
    cursor:pointer;
  }
  .toolsBtn.primary{ background: var(--accent); color:white; }
  .toolsBtn.gray{ background:#e2e8f0; color:#0f172a; }
</style>

<div id="toolsPanel" role="dialog" aria-modal="true" aria-label="Tools">
  <div id="toolsBox">
    <h3>Tools</h3>
    <input id="toolsInput" type="text" placeholder="Code eingeben (1–7 oder fertig)" autocomplete="off" />
    <div id="toolsMsg">Enter = OK • ESC = schließen</div>
    <div class="toolsBtns">
      <button class="toolsBtn gray" type="button" onclick="toolsClose()">Schließen</button>
      <button class="toolsBtn primary" type="button" onclick="toolsRun()">OK</button>
    </div>
  </div>
</div>

<script>
  /* ========= Tools (Shift+Strg+C) =========
     Eingaben:
     - 1..7 : setzt Aufgaben bis dahin korrekt
     - fertig: setzt alles korrekt und beendet
  */

  // nutzt deine bestehenden TARGET Werte, falls vorhanden:
  // TARGET = { title, bgName, accentName, secretNumber, password, emoji, finish }
  // Falls du TARGET anders nennst: hier anpassen.
  let cheated = false;

  function toolsOpen(){
    const p = document.getElementById("toolsPanel");
    const inp = document.getElementById("toolsInput");
    const msg = document.getElementById("toolsMsg");
    p.style.display = "flex";
    inp.value = "";
    msg.textContent = "Enter = OK • ESC = schließen";
    setTimeout(() => inp.focus(), 10);
  }

  function toolsClose(){
    document.getElementById("toolsPanel").style.display = "none";
  }

  function toolsSet(step){
    cheated = true;

    // Reset auf Anfang
    document.getElementById("t_title").textContent = "START TEAM";
    document.documentElement.style.setProperty("--bg", "white");
    document.documentElement.style.setProperty("--accent", "dodgerblue");
    document.getElementById("t_number").textContent = "0";
    document.getElementById("t_password").textContent = "---";
    document.getElementById("t_emoji").textContent = "AUS";
    document.getElementById("t_finish").textContent = "---";

    // Bis Step setzen
    if(step >= 1) document.getElementById("t_title").textContent = TARGET.title;
    if(step >= 2) document.documentElement.style.setProperty("--bg", TARGET.bgName);
    if(step >= 3) document.documentElement.style.setProperty("--accent", TARGET.accentName);
    if(step >= 4) document.getElementById("t_number").textContent = TARGET.secretNumber;
    if(step >= 5) document.getElementById("t_password").textContent = TARGET.password;
    if(step >= 6) document.getElementById("t_emoji").textContent = TARGET.emoji;
    if(step >= 7) document.getElementById("t_finish").textContent = TARGET.finish;
  }

  function toolsComment(step){
    // Lustige Kommentare (nur im Tools-Fenster sichtbar)
    if(step === 1) return "Du springst zu Rätsel 1… das ist quasi gar kein Cheaten 😄";
    if(step === 2) return "Rätsel 2? Du hattest ALLE Zahlen… und nimmst den Himmel. Stabil.";
    if(step === 3) return "Rätsel 3: Sonne/Gold. Glamour‑Modus aktiviert.";
    if(step === 4) return "Rätsel 4 übersprungen? Mathe in der IT? Unmöglich! 😉";
    if(step === 5) return "Rätsel 5… Passwort? Du bist offiziell ein ‚Security Consultant‘.";
    if(step === 6) return "Rätsel 6: Schalter auf AN. Du liebst Knöpfe, oder?";
    if(step === 7) return "Alles übersprungen… nur das letzte nicht? Warum tust du sowas? 😂";
    return "Okay.";
  }

  function toolsRun(){
    const raw = (document.getElementById("toolsInput").value || "").trim().toLowerCase();
    const msg = document.getElementById("toolsMsg");

    if(raw === "fertig"){
      toolsSet(7);
      msg.textContent = "Alles auf fertig gesetzt. Ja… du hast geschummelt 😄";
      setTimeout(toolsClose, 250);
      return;
    }

    const n = parseInt(raw, 10);
    if(Number.isFinite(n) && n >= 1 && n <= 7){
      toolsSet(n);
      msg.textContent = toolsComment(n);
      setTimeout(toolsClose, 450);
      return;
    }

    msg.textContent = "Ungültig. Nimm 1–7 oder „fertig“.";
  }

  // Shortcut: Shift + Strg + C
  window.addEventListener("keydown", (e) => {
    const tag = (document.activeElement && document.activeElement.tagName) ? document.activeElement.tagName.toLowerCase() : "";
    const inInput = (tag === "input" || tag === "textarea");

    if(!inInput && e.shiftKey && (e.ctrlKey || e.metaKey) && (e.key === "c" || e.key === "C")){
      e.preventDefault();
      toolsOpen();
      return;
    }

    if(document.getElementById("toolsPanel").style.display === "flex"){
      if(e.key === "Escape") toolsClose();
      if(e.key === "Enter") toolsRun();
    }
  });
</script>
