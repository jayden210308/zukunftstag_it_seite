<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Code-Quest</title>

  <style>
    /* =========================================================
       CODE-QUEST (für Kinder)
       Regel: Ändere NUR in den Bereichen:
       1) AUFGABE A (HTML)
       2) AUFGABE B (CSS)
       3) AUFGABE C (HTML)
       Wenn was kaputt ist: Seite neu laden.
       ========================================================= */

    :root{
      --bg: #f4f7fb;
      --main: #0f172a;
      --accent: #3b82f6;
    }

    body{
      margin:0;
      font-family: Arial, sans-serif;
      background: var(--bg);
      color:#0f172a;
    }

    header{
      background: linear-gradient(135deg, var(--main), #0b1220);
      color:white;
      padding: 18px 14px;
      text-align:center;
    }

    .wrap{
      width:min(920px, 92%);
      margin: 16px auto 36px;
      display:grid;
      gap: 12px;
    }

    .card{
      background:white;
      border-radius: 16px;
      box-shadow: 0 12px 30px rgba(0,0,0,.08);
      padding: 16px;
    }

    .badge{
      display:inline-block;
      background:#eef2ff;
      color:#3730a3;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 900;
      margin-bottom:10px;
    }

    h1{ margin:0; font-size: 24px; letter-spacing: .5px; }
    h2{ margin: 10px 0 8px; font-size: 18px; color: var(--main); }

    .quest{
      font-size: 18px;
      font-weight: 900;
      margin: 0;
    }

    .hint{
      margin-top: 10px;
      background:#f8fbff;
      border:1px dashed #cfe0ff;
      border-radius:12px;
      padding:10px;
      font-size:14px;
      color:#1f2a44;
    }

    .status{
      margin-top: 12px;
      padding: 10px;
      border-radius: 12px;
      font-weight: 900;
      border:1px solid #e5e7eb;
      background:#f9fafb;
    }
    .ok{
      border-color:#bbf7d0;
      background:#ecfdf5;
      color:#065f46;
    }

    .progress{
      display:flex; gap:8px; align-items:center; flex-wrap:wrap;
      margin-top: 10px;
    }
    .dot{
      width:12px; height:12px; border-radius:999px;
      background:#e5e7eb; border:1px solid #cbd5e1;
    }
    .dot.done{ background:#22c55e; border-color:#16a34a; }
    .dot.now{ background: var(--accent); border-color:#2563eb; }

    .console{
      background:#0b1220;
      color:#e5e7eb;
      border-radius: 16px;
      padding: 12px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono","Courier New", monospace;
      white-space: pre-line;
      min-height: 48px;
    }

    code{ background:#f1f5f9; padding:2px 6px; border-radius:10px; }
    .small{ opacity:.85; font-size: 13px; margin-top: 8px; }
  </style>

  <script>
    /* =========================================================
       JavaScript prüft die Lösungen automatisch.
       Du musst hier nichts ändern.
       ========================================================= */

    // Aufgabe A: Text muss GENAU so sein (Groß/Klein egal)
    const A_TARGET = "HACKER-CLUB";

    // Aufgabe B: Hintergrund soll "Himmel" sein, aber als HEX (nicht als Wort!)
    // skyblue = #87CEEB
    const B_TARGET_HEX = "#87ceeb";

    // Aufgabe C: Geheimcode aus 2 Teilen:
    // (Anzahl Buchstaben in A_TARGET) + "-" + (2 * 21)
    // A_TARGET hat 10 Buchstaben (HACKERCLUB = 10) -> "10-42"
    const C_TARGET = "10-42";

    function setConsole(msg){
      document.getElementById("console").innerText = msg;
    }

    function normalizeText(s){
      return (s || "").trim().toLowerCase();
    }

    function rgbToHex(rgb){
      // rgb(135, 206, 235) -> #87ceeb
      const m = rgb.match(/\d+/g);
      if(!m || m.length < 3) return "";
      const r = Number(m[0]).toString(16).padStart(2,"0");
      const g = Number(m[1]).toString(16).padStart(2,"0");
      const b = Number(m[2]).toString(16).padStart(2,"0");
      return ("#" + r + g + b).toLowerCase();
    }

    function dots(step){
      const total = 3;
      for(let i=1;i<=total;i++){
        const d = document.getElementById("dot"+i);
        d.classList.remove("done","now");
        if(i < step) d.classList.add("done");
        else if(i === step) d.classList.add("now");
      }
    }

    function check(){
      // === A prüfen (Überschrift) ===
      const a = normalizeText(document.getElementById("a-title").textContent);
      const doneA = (a === normalizeText(A_TARGET));

      // === B prüfen (Hintergrundfarbe) ===
      const bgRgb = getComputedStyle(document.body).backgroundColor;
      const bgHex = rgbToHex(bgRgb);
      const doneB = (bgHex === B_TARGET_HEX);

      // === C prüfen (Geheimcode) ===
      const c = (document.getElementById("c-code").textContent || "").trim();
      const doneC = (c === C_TARGET);

      let step = 1;
      if(doneA) step = 2;
      if(doneA && doneB) step = 3;
      if(doneA && doneB && doneC) step = 4;

      dots(Math.min(step,3));

      const quest = document.getElementById("questText");
      const hint = document.getElementById("hintText");
      const status = document.getElementById("status");

      if(step === 1){
        quest.textContent = "Aufgabe A: Überschrift ändern";
        hint.innerHTML =
          "Finde im HTML den Bereich <code>AUFGABE A</code> und ändere die Überschrift zu: " +
          "<b>HACKER-CLUB</b>.<br><span class='small'>Tipp: Groß/Klein ist egal – aber Zeichen wie „-“ müssen stimmen.</span>";
        status.className = "status";
        status.textContent = "Noch nicht gelöst. Suche nach AUFGABE A.";
        setConsole("Warte auf Aufgabe A …");
      } else if(step === 2){
        quest.textContent = "Aufgabe B: Hintergrundfarbe (CSS-Rätsel)";
        hint.innerHTML =
          "Finde im CSS den Bereich <code>AUFGABE B</code>.<br>" +
          "Setze <code>--bg</code> auf die <b>HEX-Farbe</b> vom Himmel: <b>#87CEEB</b>.<br>" +
          "<span class='small'>Hinweis: Es muss HEX sein (mit #). Nicht „skyblue“.</span>";
        status.className = "status";
        status.textContent = "Aufgabe A geschafft ✅ Jetzt AUFGABE B lösen.";
        setConsole("Aufgabe A erkannt ✅");
      } else if(step === 3){
        quest.textContent = "Aufgabe C: Geheimcode bauen";
        hint.innerHTML =
          "Finde im HTML den Bereich <code>AUFGABE C</code> und trage den Geheimcode ein.<br><br>" +
          "<b>So baust du ihn:</b><br>" +
          "Teil 1 = Anzahl der <b>Buchstaben</b> in „HACKERCLUB“ (ohne Minus).<br>" +
          "Teil 2 = <b>2 × 21</b>.<br>" +
          "Format: <code>Teil1-Teil2</code> (mit Minus dazwischen).<br>" +
          "<span class='small'>Beispiel-Format: 8-14 (das ist nur ein Beispiel!)</span>";
        status.className = "status";
        status.textContent = "Aufgabe B geschafft ✅ Jetzt AUFGABE C lösen.";
        setConsole("Aufgabe B erkannt ✅ (Hintergrund stimmt)");
      } else {
        quest.textContent = "Fertig! 🎉";
        hint.innerHTML =
          "<b>Bonus-Ideen</b> (frei):<br>" +
          "<ul style='margin:8px 0 0 18px'>" +
          "<li>Ändere <code>--accent</code> (Buttons) auf deine Lieblingsfarbe.</li>" +
          "<li>Ändere den Untertitel-Text im Header.</li>" +
          "<li>Mach die Überschrift länger (z.B. „HACKER-CLUB 2026“), aber dann ist Aufgabe A wieder „nicht gelöst“ 🙂</li>" +
          "</ul>";
        status.className = "status ok";
        status.textContent = "Alle Aufgaben geschafft! ✅✅✅";
        setConsole("Alles erkannt ✅ Super gemacht!");
      }
    }

    window.addEventListener("load", () => {
      check();
      setInterval(check, 600);
    });
  </script>
</head>

<body>
  <header>
    <!-- =========================
         AUFGABE A (HTML)
         Ändere NUR die Überschrift (den Text).
         Ziel: HACKER-CLUB
         ========================= -->
    <h1 id="a-title">CODE-QUEST</h1>

    <!-- Idee: Wenn du fertig bist, kannst du diesen Satz ändern (Bonus) -->
    <div class="small">Rechtsklick → <b>Untersuchen</b>. Suche nach AUFGABE A, AUFGABE B, AUFGABE C.</div>
  </header>

  <main class="wrap">
    <section class="card">
      <div class="badge">Aktuelle Aufgabe (immer nur 1 sichtbar)</div>
      <p id="questText" class="quest">…</p>
      <div id="hintText" class="hint">…</div>

      <div id="status" class="status">…</div>

      <div class="progress" aria-label="Fortschritt">
        <div class="dot" id="dot1" title="A"></div>
        <div class="dot" id="dot2" title="B"></div>
        <div class="dot" id="dot3" title="C"></div>
      </div>

      <div class="hint">
        <b>Regeln:</b>
        <ul style="margin:8px 0 0 18px">
          <li>Ändere nur in den Bereichen A/B/C.</li>
          <li>Es gibt pro Aufgabe genau <b>eine richtige Lösung</b>.</li>
          <li>Wenn etwas kaputt ist: Seite neu laden.</li>
        </ul>
      </div>
    </section>

    <section class="card">
      <div class="badge">Konsole</div>
      <div id="console" class="console">…</div>
    </section>
  </main>

  <!-- =========================
       AUFGABE B (CSS)
       Ändere NUR die Hintergrundfarbe (--bg).
       Ziel: HEX vom Himmel (#87CEEB)
       ========================= -->
  <style>
    :root{
      --bg: #f4f7fb; /* <-- HIER ÄNDERN */
    }
  </style>

  <!-- =========================
       AUFGABE C (HTML)
       Ändere NUR den Inhalt von <span id="c-code">...</span>
       Tipp: Du musst den Code AUSRECHNEN.
       ========================= -->
  <div style="display:none">
    <span id="c-code">0-0</span>
  </div>

</body>
</html>
