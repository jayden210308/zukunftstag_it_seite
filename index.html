<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Code‑Quest – Rätsel (ohne Googeln)</title>

  <style>
    /* =========================================================
       CODE‑QUEST (für Kinder)
       - Du musst NICHT googeln.
       - Du musst nur an den markierten Stellen Text/Farben ändern.
       - Du siehst immer nur 1 Rätsel. Wenn es stimmt, kommt das nächste.

       REGELN:
       - Ändere NUR in den Bereichen: AUFGABE 1 bis AUFGABE 7
       - Wenn etwas kaputt ist: Seite neu laden
       ========================================================= */

    :root{
      --bg: white;
      --main: #0f172a;
      --accent: dodgerblue;
      --panel: white;
    }

    body{
      margin:0;
      font-family: Arial, sans-serif;
      background: var(--bg);
      color:#0f172a;
    }

    header{
      background: linear-gradient(135deg, var(--main), #0b1220);
      color:white;
      padding: 18px 14px;
      text-align:center;
    }
    header h1{ margin:0; font-size: 24px; letter-spacing: .4px; }
    header p{ margin:8px 0 0; opacity:.95; }

    .wrap{
      width:min(980px, 92%);
      margin: 16px auto 40px;
      display:grid;
      gap: 12px;
    }

    .card{
      background: var(--panel);
      border-radius: 16px;
      box-shadow: 0 12px 30px rgba(0,0,0,.08);
      padding: 16px;
    }

    .badge{
      display:inline-block;
      background:#eef2ff;
      color:#3730a3;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 900;
      margin-bottom:10px;
    }

    .quest{
      font-size: 18px;
      font-weight: 900;
      margin: 0 0 8px;
      color:#111827;
    }

    .hint{
      margin-top: 10px;
      background:#f8fbff;
      border:1px dashed #cfe0ff;
      border-radius:12px;
      padding:10px;
      font-size:14px;
      color:#1f2a44;
    }

    .status{
      margin-top: 12px;
      padding: 10px;
      border-radius: 12px;
      font-weight: 900;
      border:1px solid #e5e7eb;
      background:#f9fafb;
    }
    .ok{
      border-color:#bbf7d0;
      background:#ecfdf5;
      color:#065f46;
    }

    .progress{
      display:flex; gap:8px; align-items:center; flex-wrap:wrap;
      margin-top: 10px;
    }
    .dot{
      width:12px; height:12px; border-radius:999px;
      background:#e5e7eb; border:1px solid #cbd5e1;
    }
    .dot.done{ background:#22c55e; border-color:#16a34a; }
    .dot.now{ background: var(--accent); border-color:#2563eb; }

    .console{
      background:#0b1220;
      color:#e5e7eb;
      border-radius: 16px;
      padding: 12px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono","Courier New", monospace;
      white-space: pre-line;
      min-height: 56px;
    }

    code{ background:#f1f5f9; padding:2px 6px; border-radius:10px; }
    .small{ opacity:.85; font-size: 13px; margin-top: 8px; }

    /* nur für die Prüfung (damit JS eine echte Farbe messen kann) */
    #probeBtn{ display:none; background: var(--accent); }
  </style>

  <script>
    /* =========================================================
       AUTO‑CHECK (bitte nicht ändern)
       Prüft automatisch, ob du die Aufgabe gelöst hast.
       ========================================================= */

    const TOTAL = 7;

    // Ziele (werden nicht direkt als Lösung hingeschrieben)
    const TARGET = {
      // 1) Überschrift wird "CODE DETEKTIVE"
      title: "CODE DETEKTIVE",

      // 2) Hintergrundfarbe = "skyblue" (kann man wissen)
      bgName: "skyblue",

      // 3) Buttonfarbe = "gold" (kann man wissen)
      accentName: "gold",

      // 4) Geheime Zahl = 7 * 6 = 42
      secretNumber: "42",

      // 5) Passwort = erstes Wort der Überschrift (CODE) klein
      password: "code",

      // 6) Emoji‑Schalter muss an sein
      emoji: "AN",

      // 7) Abschlusswort
      finish: "FERTIG"
    };

    function setConsole(msg){
      document.getElementById("console").innerText = msg;
    }

    function norm(s){ return (s||"").trim(); }
    function lower(s){ return norm(s).toLowerCase(); }

    function setDots(step){
      for(let i=1;i<=TOTAL;i++){
        const d = document.getElementById("dot"+i);
        d.classList.remove("done","now");
        if(i < step) d.classList.add("done");
        else if(i === step) d.classList.add("now");
      }
    }

    // Farbe vergleichen: wir setzen testweise dieselbe Farbe auf ein unsichtbares Element
    function colorEqualsCssName(computedRgb, cssName){
      const probe = document.getElementById("colorProbe");
      probe.style.color = cssName;
      const want = getComputedStyle(probe).color; // rgb(...)
      return computedRgb === want;
    }

    function checkAll(){
      // Aufgabe 1
      const title = lower(document.getElementById("t_title").textContent);
      const done1 = (title === lower(TARGET.title));

      // Aufgabe 2: background-color (berechneter rgb) muss skyblue sein
      const bgRgb = getComputedStyle(document.body).backgroundColor;
      const done2 = colorEqualsCssName(bgRgb, TARGET.bgName);

      // Aufgabe 3: accent (Buttonfarbe) muss gold sein
      const accentRgb = getComputedStyle(document.getElementById("probeBtn")).backgroundColor;
      const done3 = colorEqualsCssName(accentRgb, TARGET.accentName);

      // Aufgabe 4: Geheimzahl
      const n = norm(document.getElementById("t_number").textContent);
      const done4 = (n === TARGET.secretNumber);

      // Aufgabe 5: Passwort
      const pw = lower(document.getElementById("t_password").textContent);
      const done5 = (pw === TARGET.password);

      // Aufgabe 6: Emoji-Schalter
      const emoji = norm(document.getElementById("t_emoji").textContent);
      const done6 = (emoji === TARGET.emoji);

      // Aufgabe 7: Abschluss
      const fin = norm(document.getElementById("t_finish").textContent);
      const done7 = (fin === TARGET.finish);

      let step = 1;
      if(done1) step = 2;
      if(done1 && done2) step = 3;
      if(done1 && done2 && done3) step = 4;
      if(done1 && done2 && done3 && done4) step = 5;
      if(done1 && done2 && done3 && done4 && done5) step = 6;
      if(done1 && done2 && done3 && done4 && done5 && done6) step = 7;
      if(done1 && done2 && done3 && done4 && done5 && done6 && done7) step = 8;

      setDots(Math.min(step, TOTAL));

      // nur 1 Aufgabe anzeigen
      for(let i=1;i<=TOTAL;i++){
        document.getElementById("task"+i).style.display = (i === Math.min(step, TOTAL)) ? "block" : "none";
      }

      const status = document.getElementById("status");
      const finishBox = document.getElementById("finishBox");

      if(step === 8){
        status.className = "status ok";
        status.textContent = "🎉 Geschafft! Alle Rätsel gelöst!";
        finishBox.style.display = "block";
        setConsole("Alles erkannt ✅ Bonus: Ändere jetzt Dinge und beobachte, was passiert.");
      } else {
        status.className = "status";
        status.textContent = "Ich prüfe automatisch…";
        finishBox.style.display = "none";

        // kleine Hinweise in der Konsole
        const tips = {
          1: "Tipp: Rechtsklick → Untersuchen → suche nach „AUFGABE 1“ im HTML.",
          2: "Tipp: Suche nach „AUFGABE 2“ im CSS und ändere nur --bg.",
          3: "Tipp: Suche nach „AUFGABE 3“ im CSS und ändere nur --accent.",
          4: "Tipp: Suche nach „AUFGABE 4“ im HTML und trage die Zahl ein.",
          5: "Tipp: Suche nach „AUFGABE 5“ im HTML. Passwort = erstes Wort der Überschrift, klein.",
          6: "Tipp: Suche nach „AUFGABE 6“ im HTML. Setze den Schalter auf AN.",
          7: "Tipp: Suche nach „AUFGABE 7“ im HTML. Abschlusswort eintragen."
        };
        setConsole(tips[Math.min(step, TOTAL)]);
      }

      // Emoji-Feature (nur wenn Schalter AN ist)
      const emojiBox = document.getElementById("emojiBox");
      emojiBox.textContent = (emoji === "AN") ? "⭐ Emoji‑Modus ist AN!" : "";
    }

    window.addEventListener("load", () => {
      checkAll();
      setInterval(checkAll, 600);
    });
  </script>
</head>

<body>
  <header>
    <!-- =========================
         AUFGABE 1 (HTML)
         Rätsel: Die Überschrift soll wie ein Teamname klingen.
         Hinweis: 2 Wörter.
         ========================= -->
    <h1 id="t_title">START TEAM</h1>

    <p class="small">Du siehst immer nur 1 Rätsel. Wenn es stimmt, kommt automatisch das nächste.</p>
    <div id="emojiBox" class="small"></div>
  </header>

  <main class="wrap">
    <section class="card">
      <div class="badge">Aktuelles Rätsel</div>

      <div id="task1">
        <p class="quest">Rätsel 1: Teamname</p>
        <div class="hint">
          Ändere im HTML (bei <code>AUFGABE 1</code>) die Überschrift zu:<br>
          <b>CODE DETEKTIVE</b>
        </div>
      </div>

      <div id="task2" style="display:none;">
        <p class="quest">Rätsel 2: Himmel</p>
        <div
